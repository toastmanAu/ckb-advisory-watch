# Nervos CKB ecosystem projects watched for upstream dependency advisories.
#
# Append freely. Minimum fields: slug, display_name.
# Optional: manifests (list of paths to known manifests; if omitted the
# crawler auto-discovers Cargo.toml / package.json / go.mod in the repo root
# and one level deep).
#
# branch defaults to the repo's default branch.
#
# Curated: only active, dep-heavy, production repos. Archived repos and pure
# asm/data/docs repos skipped (no advisory surface). Research log in seeds.txt.

projects:
