# Copy to config.toml and edit.

[agent]
data_dir = "data"
log_level = "info"

[github]
# Optional token — unauthenticated requests are rate-limited to 60/hour,
# a token raises the limit to 5000/hour. Create at:
#   https://github.com/settings/tokens  (scope: public_repo is enough)
token = ""

[poll]
# How often (seconds) to poll each source.
github_repos = 86400    # daily
osv = 3600              # hourly (OSV publishes a fresh bulk ZIP hourly)
ghsa = 1800             # 30 min
rustsec = 3600
pypa = 3600

[osv]
# OSV.dev ecosystems to pull bulk zips for. Names must match what OSV uses
# (case-sensitive — "PyPI" not "pypi", "crates.io" not "Cargo").
# npm is the biggest (~190 MB zip) — if the Zero 3 is tight on RAM or
# bandwidth, drop it and rely on the GHSA poller instead (Phase 2b).
ecosystems = ["crates.io", "npm", "PyPI", "Go", "Maven"]

[outputs.vault]
enabled = true
path = "/home/phill/Documents/loacal-vault/Projects/CKB Advisory Watch/reports"

[outputs.website]
enabled = false
# Where to rsync generated /advisories pages on wyltekindustries.com
rsync_target = ""

[outputs.telegram]
enabled = false
bot_token = ""
chat_id = ""
# Only post for advisories at or above this CVSS severity.
# one of: low, medium, high, critical
min_severity = "medium"

[dashboard]
# Bind host and port for the browser dashboard. 0.0.0.0 makes it reachable
# from other machines on the LAN.
host = "0.0.0.0"
port = 8080
# Absolute URL to this instance; used in share emails so recipients can
# click back in. On the Pi: http://192.168.68.121:8080 (or domain if proxied).
base_url = "http://127.0.0.1:8080"

[share]
enabled = true
# Where share emails land. Typically your own inbox for quick forward.
recipient = ""
sender    = ""
# Gmail SMTP defaults; fill smtp_user + smtp_password with a Gmail address
# and an app password (https://myaccount.google.com/apppasswords).
smtp_host = "smtp.gmail.com"
smtp_port = 465
smtp_user = ""
smtp_password = ""
